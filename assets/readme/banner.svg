<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.05" />
    </pattern>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>
  </defs>
  <rect width="1200" height="400" fill="url(#bg)" />
  <rect width="1200" height="400" fill="url(#grid)" />
  
  <g transform="translate(100, 140)">
    <!-- Foundry Icon -->
    <path d="M 0 20 L 40 0 L 80 20 L 80 60 L 40 80 L 0 60 Z" fill="none" stroke="url(#textGrad)" stroke-width="4" />
    <path d="M 40 40 L 40 0 M 40 40 L 0 60 M 40 40 L 80 60" stroke="url(#textGrad)" stroke-width="4" stroke-opacity="0.5" />
    <circle cx="40" cy="40" r="8" fill="#c084fc" />
    
    <!-- Title -->
    <text x="120" y="55" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="64" font-weight="900" fill="#ffffff" letter-spacing="-1">Pattern Foundry</text>
    
    <!-- Subtitle -->
    <text x="125" y="110" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="24" font-weight="400" fill="#94a3b8" letter-spacing="0">Extract design intelligence. Generate premium, brand-neutral UI/UX.</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="1050" cy="80" r="150" fill="#818cf8" opacity="0.15" filter="blur(40px)" />
  <circle cx="950" cy="300" r="200" fill="#c084fc" opacity="0.1" filter="blur(60px)" />
</svg>
